name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (CPU-only; GPU deps live in env/ lockfiles)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pytest
      - name: Ruff lint
        run: ruff check .
      - name: Assert generated ontology has no drift
        run: python tools/generate_ontology.py --check
      - name: Block training merges on ontology-aware flip invariant
        run: pytest -q tests/test_training_augmentations.py
      - name: Pytest
        run: pytest

name: Build RunPod Serverless overflow images

on:
  push:
    branches:
      - codex/runpod-serverless-overflow-20260724
    paths:
      - ".github/workflows/runpod-serverless-overflow-images.yml"
      - "deploy/runpod_serverless/**"
      - "src/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: comfyui
            image: maskfactory-comfyui-overflow
            dockerfile: deploy/runpod_serverless/comfyui/Dockerfile
          - profile: maskfactory
            image: maskfactory-command-overflow
            dockerfile: deploy/runpod_serverless/maskfactory/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/kevinsgarrett/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.profile }}

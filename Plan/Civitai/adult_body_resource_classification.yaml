# Plan/Civitai/adult_body_resource_classification.yaml
#
# MF-P0-14.01 classification for Civitai adult/NSFW-labeled and adjacent body
# resources. Scope intentionally covers every unique Civitai ID currently present
# in civitai_bootstrap_manifest.json, not just the explicit NSFW filenames, so no
# adult/body/manual-download candidate is left unclassified.
schema_version: 1.0.0
manifest_file: Plan/Civitai/civitai_bootstrap_manifest.json
manual_download_inventory: Plan/Civitai/manual_downloads_inventory.json
classified_at_utc: "2026-07-10T20:55:00Z"
manifest_record_count_at_classification: 79
unique_civitai_id_count_at_classification: 71
policy:
  allowed_primary_roles:
    - provider_vote
    - comfyui_graph_reference
    - stress_fixture
    - qa_probe
    - reject
  adult_nsfw_label_is_not_rejection_reason: true
  adult_nsfw_assets_may_be_training_data_when_eligible: true
  adult_nsfw_assets_may_seed_human_reviewed_gold_when_eligible: true
  require_provenance_license_consent_before_training_or_gold: true
  classification_basis:
    - Plan/16_EXTERNAL_FOUNDATION_BOOTSTRAP.md
    - Plan/Civitai/README.md
    - Plan/Civitai/civitai_bootstrap_manifest.json
    - Plan/Civitai/manual_downloads_inventory.json
role_defaults:
  provider_vote:
    allowed_use: Candidate detector/segmentation proposal vote only; compare against Sapiens, SCHP, DensePose, DWPose/MediaPipe, SAM2, and source overlays.
    authority_gate: Not mask authority; cannot clear gold, BLOCK, or QA decisions.
    training_gold_eligibility: Eligible after provenance, license, adult-age/consent status, and allowed use are explicitly recorded; any gold mask still requires the normal consensus, QA, and human-review workflow.
  comfyui_graph_reference:
    allowed_use: Reference wiring for controlled MaskFactory/ComfyUI adapters and debug graphs only.
    authority_gate: Not a production stage unless rebuilt under MaskFactory controls and QA.
    training_gold_eligibility: Graph files are not examples by themselves; eligible adult source images and masks produced through a governed graph may enter training or human-reviewed gold after the normal intake, rights, QA, and review gates.
  stress_fixture:
    allowed_use: Pose/depth/control stress fixture for occlusion, contact, multi-person, perspective, and body-visibility QA.
    authority_gate: Not a mask provider and not evidence of anatomical truth.
    training_gold_eligibility: Eligible as training examples or seeds for human-reviewed gold when the underlying adult source imagery has verified provenance, license, adult-age/consent status, and allowed use, and passes normal intake and annotation QA.
  qa_probe:
    allowed_use: QA visualization, disagreement probe, or non-authoritative comparison signal only.
    authority_gate: Not mask authority and not a production decision source.
    training_gold_eligibility: Probe outputs may become training examples or seeds for human-reviewed gold only when paired with an eligible governed source image and passed through normal annotation, QA, and review.
  reject:
    allowed_use: Do not use in MaskFactory pipelines except as a recorded rejected candidate.
    authority_gate: Rejected as provider, fixture, graph reference, and QA probe.
    training_gold_eligibility: Ineligible while rejected; reclassification requires documented evidence that resolves the rejection reason and all normal governance gates.

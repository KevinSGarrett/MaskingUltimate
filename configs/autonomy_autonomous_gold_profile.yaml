schema_version: "1.0.0"
profile_id: "maskfactory-autonomous-certified-gold-admission-v1"
enabled: true
authority: "autonomous_certified_gold_profile"
governing_amendment: "Plan/SIDE_THREAD_HANDOFF_SAM31_AUTONOMOUS_GOLD_20260713.md#autonomous-gold-redesign"
# Approved authority replacement (NOT a weakening of the Wilson statistics).
#
# Per Kevin's approved autonomous-gold amendment, human anchors are NOT the
# operational-gold authority. This profile REPLACES the human-audit calibration
# authority with a governed autonomous authority: certification is estimated
# from independent multi-provider (different model family) agreement plus
# candidate/perturbation stability plus complete-map hard-veto QA. The exact
# one-sided Wilson false-accept bound and the exact zero-failure serious bound
# are preserved unchanged and applied to the autonomously-verified sample set;
# only the *authority* that supplies each sample changes (cross-family
# disagreement stands in for a human-audited defect, and is deliberately
# conservative because correlated SAM variants do not count as independent).
authority_replacement:
  replaces: "human_anchor_gold_calibration_authority"
  does_not_weaken_wilson_math: true
  preserves_exact_bounds: true
  never_trains_against_human_anchor_holdout: true
  correlated_sam_variants_are_not_independent: true
  defect_signal: "independent_cross_family_disagreement"
  serious_defect_signal: "independent_cross_family_serious_disagreement"
# Independence + stability requirements every counted sample must satisfy.
independent_provider_families_minimum: 3
require_candidate_stability: true
require_perturbation_stability: true
require_complete_map_hard_veto_pass: true
require_image_disjoint_corpus: true
require_exact_pipeline_fingerprint: true
# Statistical floors — identical rigor to the human-anchor certificate.
statistical_floors:
  confidence_level: 0.95
  minimum_autonomous_verified_per_risk_bucket: 30
  maximum_false_accept_upper_bound: 0.01
  aggregate_false_accept_bound_method: "one_sided_wilson"
  maximum_serious_false_accept_upper_bound: 0.005
  serious_false_accept_bound_method: "exact_zero_failure"
  maximum_certificate_age_days: 30
claim_boundary:
  is_operational_admission_authority: true
  is_not_independent_real_accuracy_claim: true
  is_not_human_anchor_holdout: true
  default_off_in_hot_tournament_path: true
profile_sha256: "789d9e0af3a72cd8ff5fa4b0229cbcf662a3f904e9b336f6483a2fbfc287c823"

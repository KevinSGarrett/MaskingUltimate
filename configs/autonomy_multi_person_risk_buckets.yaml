schema_version: 1.0.0
policy_id: multi_person_risk_v1
allowed_instance_contexts: [duo, small_group]
solo_evidence_allowed: false
assignment_priority:
  - identity_ambiguity
  - crowding
  - truncation
  - scale_disparity
  - occlusion
  - contact
  - small_group_overlap
  - duo_overlap
  - small_group_baseline
  - duo_baseline
buckets:
  duo_baseline: {description: Two promoted people without a higher-priority interaction risk.}
  small_group_baseline: {description: Three or more promoted people without a higher-priority interaction risk.}
  duo_overlap: {description: Pixel overlap or ownership competition between two promoted people.}
  small_group_overlap: {description: Pixel overlap or ownership competition among three or more promoted people.}
  contact: {description: Reciprocal person-to-person or person-to-object contact boundary.}
  occlusion: {description: Interperson occlusion with visible ownership and depth-order risk.}
  scale_disparity: {description: Promoted people have materially different pixel scale or part resolution.}
  truncation: {description: One or more promoted people are cropped or leave the source frame.}
  crowding: {description: Dense surrounding people or instances increase identity/ownership ambiguity.}
  identity_ambiguity: {description: "Person identity, instance ownership, or promotion mapping is ambiguous."}
exchangeability:
  confidence_level: 0.95
  minimum_records_per_stratum: 30
  maximum_false_accept_rate_delta: 0.01
  maximum_serious_failure_rate_delta: 0.0025
  require_wilson_interval_overlap: true
  sparse_action: abstain
  nonexchangeable_action: split

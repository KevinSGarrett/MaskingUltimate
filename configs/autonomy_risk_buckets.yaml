schema_version: 1.0.0
policy_id: body_parts_risk_v1

# Highest-risk applicable bucket wins.  This produces one auditable calibration
# stratum per accepted output while retaining all raw features in audit evidence.
assignment_priority:
  - out_of_distribution
  - multi_person_overlap
  - occlusion_contact
  - sensitive_anatomy
  - hands_feet
  - hair_boundaries
  - clothing_materials
  - small_parts
  - large_parts

buckets:
  large_parts:
    description: Large torso and proximal-limb regions in ordinary in-distribution views.
    high_risk: false
    in_distribution: true
  small_parts:
    description: Small distal or fine-grained parts excluding separately governed hands and feet.
    high_risk: true
    in_distribution: true
  hands_feet:
    description: Hands, fingers, feet, and toes, including fine boundary structure.
    high_risk: true
    in_distribution: true
  hair_boundaries:
    description: Hair, face-adjacent wisps, and other high-frequency body boundaries.
    high_risk: true
    in_distribution: true
  clothing_materials:
    description: Clothing, underwear, footwear, accessories, and body/material boundaries.
    high_risk: true
    in_distribution: true
  sensitive_anatomy:
    description: Observable sensitive adult anatomy governed by the active ontology and content lane.
    high_risk: true
    in_distribution: true
  occlusion_contact:
    description: Self-occlusion, object contact, truncation, and inter-part contact boundaries.
    high_risk: true
    in_distribution: true
  multi_person_overlap:
    description: Cross-person overlap, contact, identity ambiguity, and foreground ownership risk.
    high_risk: true
    in_distribution: true
  out_of_distribution:
    description: Any detected domain, capture, style, anatomy, or quality shift outside calibrated support.
    high_risk: true
    in_distribution: false

exchangeability:
  confidence_level: 0.95
  minimum_records_per_stratum: 30
  maximum_false_accept_rate_delta: 0.02
  maximum_serious_failure_rate_delta: 0.005
  require_wilson_interval_overlap: true
  sparse_action: abstain
  nonexchangeable_action: split

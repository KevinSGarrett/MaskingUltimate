schema_version: "1.0.0"
policy_id: maskfactory-bridge-recovery-v1
policy_version: "1.0.0"
canonicalization:
  algorithm: maskfactory-canonical-json-v1
  excluded_top_level_fields:
    - policy_sha256
transaction_phases:
  - reservation
  - admission
  - lease_acquired
  - submitted
  - provider_result
  - artifacts_staged
  - artifacts_published
  - receipt_signed
  - receipt_written
  - receipt_committed_event
  - checkpoint_advanced
  - cache_published
receipt_last_order:
  - artifacts_published
  - receipt_signed
  - receipt_written
  - receipt_committed_event
  - checkpoint_advanced
durable_kill_boundaries:
  - reservation
  - admission
  - lease_acquired
  - submitted_known
  - submitted_unknown
  - provider_result
  - artifacts_staged
  - artifacts_published
  - receipt_signed
  - receipt_written
  - receipt_committed_event
  - checkpoint_advanced
  - cache_published
  - install_switch
  - rollback
reconciliation_outcomes:
  found_running:
    remote_status: running
    resubmission_authorized: false
    requires_remote_identity: true
    requires_result: false
    requires_not_found: false
  found_completed_pending_receipt:
    remote_status: completed
    resubmission_authorized: false
    requires_remote_identity: true
    requires_result: true
    requires_not_found: false
  found_failed:
    remote_status: failed
    resubmission_authorized: false
    requires_remote_identity: true
    requires_result: false
    requires_not_found: false
  not_found:
    remote_status: not_found
    resubmission_authorized: true
    requires_remote_identity: false
    requires_result: false
    requires_not_found: true
gpu_lease_states:
  - held
  - contended
  - stale_owner
  - lost
  - absent
  - released
cache_freshness_max_age_ms: 300000
decision_snapshot_required_fields:
  - health
  - capability
  - adopted_release
  - revocation
  - service_openapi
  - node_pack
  - policy
  - route
  - gpu_lease
rejection_reason_codes:
  - incomplete_transaction
  - receipt_before_artifacts
  - checkpoint_before_receipt
  - unresolved_receipt_digest
  - orphan_artifact_promotion
  - authority_drift
  - duplicate_execution
  - outcome_unknown_unreconciled
  - resubmit_without_not_found
  - reconciliation_evidence_invalid
  - decision_snapshot_incomplete
  - health_stale_or_missing
  - capability_changed
  - revocation_stale_or_missing
  - release_binding_drift
  - cache_stale_or_unbound
  - node_pack_drift
  - service_drift
  - gpu_lease_contention
  - gpu_lease_unowned_cleanup
  - kill_boundary_fail_closed
  - rollback_incomplete
  - journal_recovery_invalid
  - external_main_prerequisite_unmet
external_main_prerequisites:
  - main_durable_journal_retention
  - main_atomic_append_with_side_effects
  - main_remote_execution_history_provider
  - main_cache_tombstone_and_rebuild
  - main_node_pack_atomic_install_rollback
  - main_signed_decision_snapshots
policy_sha256: fb1e466cecea622d042d705e83418cdebac8644bf3ef5c4c0a734f4a4535b40e

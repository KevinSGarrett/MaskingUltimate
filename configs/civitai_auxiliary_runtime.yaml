schema_version: 1.0.0
registry_path: configs/civitai_auxiliary_detectors.yaml

# External specialists are never semantic or gold authority.  `assist` may improve
# SAM2 prompts/material seeds and create review overlays.  `vote` additionally needs
# a current gold-backed promotion certificate before S09 may consume it.
policy:
  default_mode: shadow
  allowed_modes: [disabled, shadow, assist, vote]
  vote_requires_promotion_certificate: true
  promotion_certificate_path: qa/auxiliary/promotion_certificates.json
  minimum_gold_benchmark_instances: 30
  minimum_mean_iou_gain: 0.01
  minimum_boundary_f_gain: 0.01
  require_no_hard_class_regression: true
  preserve_raw_outputs: true
  fail_pipeline_on_provider_error: false
  max_models_per_instance: 14
  device: cpu
  image_size: 640
  confidence: 0.25
  iou: 0.45
  max_detections: 32

detectors:
  hand_detailer_v2_v9c:
    mode: assist
    priority: 100
    expected_task: segment
    expected_classes: [hand]
    roi_priors: [left_hand_base, right_hand_base]
    roi_crop_labels: [left_hand, right_hand]
    roi_scale: 1.6
    requires_any_crop: [left_hand, right_hand]
    outputs:
      hand: {kind: support, target: hands}

  eye_detailer_v2:
    mode: assist
    priority: 72
    expected_task: segment
    expected_classes: [eye]
    roi_priors: [hair, head_face]
    roi_scale: 1.4
    outputs:
      eye: {kind: protected, target: eyes}

  face_band_mask_detailer_v1_v8_seg:
    mode: assist
    priority: 76
    expected_task: segment
    expected_classes: [mask]
    roi_priors: [hair, head_face]
    roi_scale: 1.35
    outputs:
      mask: {kind: protected, target: face_bands}

  mouth_2d_yolo_seg_v1:
    mode: assist
    priority: 74
    expected_task: segment
    expected_classes: [mouth]
    roi_priors: [hair, head_face]
    roi_scale: 1.3
    outputs:
      mouth: {kind: protected, target: mouth}

  armpit_2d_yolov8_seg_v1:
    mode: assist
    priority: 68
    expected_task: segment
    expected_classes: [armpit_seg]
    roi_priors: [chest_upper_torso, left_upper_arm, right_upper_arm]
    roi_scale: 1.35
    requires_any_pose_tag: [arms_raised, arms_crossed]
    outputs:
      armpit_seg: {kind: region, target: armpit_boundary}

  nails_seg_yolov8_v1:
    mode: assist
    priority: 70
    expected_task: segment
    expected_classes: [Nail]
    roi_priors: [left_hand_base, right_hand_base]
    roi_crop_labels: [left_hand, right_hand]
    roi_scale: 1.5
    requires_any_crop: [left_hand, right_hand]
    outputs:
      Nail: {kind: protected, target: nails}

  rear_pelvis_assdetailer_v2_seg:
    mode: shadow
    priority: 55
    expected_task: segment
    expected_classes: [ass]
    roi_priors: [pelvic_region, left_hip, right_hip]
    roi_scale: 1.35
    allowed_views: [back, left_3_4, right_3_4]
    outputs:
      ass: {kind: part_candidate, target: pelvic_region}

  foot_shoe_detailer_v04_seg:
    mode: assist
    priority: 96
    expected_task: segment
    expected_classes: [foot, shoes]
    roi_priors: [left_foot_base, left_toes, right_foot_base, right_toes]
    roi_crop_labels: [left_foot, right_foot]
    roi_scale: 1.6
    requires_any_crop: [left_foot, right_foot]
    outputs:
      foot: {kind: support, target: feet}
      shoes: {kind: material_candidate, target: footwear}

  shoes_footwear_yolov8_v2:
    mode: assist
    priority: 84
    expected_task: detect
    expected_classes: [footwear]
    roi_priors: [left_foot_base, right_foot_base]
    roi_crop_labels: [left_foot, right_foot]
    roi_scale: 1.7
    requires_any_crop: [left_foot, right_foot]
    outputs:
      footwear: {kind: box_prompt, target: footwear}

  foot_after_detailer_v1:
    mode: shadow
    priority: 42
    expected_task: detect
    expected_classes: [object]
    roi_priors: [left_foot_base, right_foot_base]
    roi_crop_labels: [left_foot, right_foot]
    roi_scale: 1.7
    outputs:
      object: {kind: box_prompt, target: feet}

  hair_after_detailer_v1:
    mode: assist
    priority: 94
    expected_task: segment
    expected_classes: [object]
    roi_priors: [hair, head_face]
    roi_scale: 1.8
    outputs:
      object: {kind: part_candidate, target: hair}

  teeth_seg_v1:
    mode: assist
    priority: 66
    expected_task: segment
    expected_classes: [teeth]
    roi_priors: [hair, head_face]
    roi_scale: 1.25
    outputs:
      teeth: {kind: protected, target: teeth}

  lips_after_detailer_v1:
    mode: shadow
    priority: 45
    expected_task: detect
    expected_classes: [lips]
    roi_priors: [hair, head_face]
    roi_scale: 1.25
    outputs:
      lips: {kind: box_prompt, target: lips}

  socks_seg_yolov8_v1:
    # Live probe 2026-07-13 mislabeled bare lower legs as socks; remain shadow
    # until a gold-backed promotion benchmark proves a net correction-time win.
    mode: shadow
    priority: 88
    expected_task: segment
    expected_classes: [socks]
    roi_priors: [left_calf, left_ankle, left_foot_base, right_calf, right_ankle, right_foot_base]
    roi_scale: 1.35
    outputs:
      socks: {kind: material_candidate, target: glove_or_sock}

  glasses_detailer_v1_seg:
    mode: assist
    priority: 78
    expected_task: segment
    expected_classes: [glasses]
    roi_priors: [hair, head_face]
    roi_scale: 1.35
    outputs:
      glasses: {kind: protected, target: glasses}

  jewelry_v1:
    mode: shadow
    priority: 35
    expected_task: detect
    expected_classes: [bracelets, brooches, belt, earring, maangtika, necklace, nose_ring, ring, tiara]
    outputs:
      bracelets: {kind: box_prompt, target: accessory}
      brooches: {kind: box_prompt, target: accessory}
      belt: {kind: box_prompt, target: waistband}
      earring: {kind: box_prompt, target: accessory}
      maangtika: {kind: box_prompt, target: accessory}
      necklace: {kind: box_prompt, target: accessory}
      nose_ring: {kind: box_prompt, target: accessory}
      ring: {kind: box_prompt, target: accessory}
      tiara: {kind: box_prompt, target: accessory}

  rings_v1:
    mode: shadow
    priority: 34
    expected_task: detect
    expected_classes: [ring]
    roi_priors: [left_hand_base, right_hand_base]
    roi_crop_labels: [left_hand, right_hand]
    roi_scale: 1.5
    outputs:
      ring: {kind: box_prompt, target: accessory}

  tattoo_yolov8_v1:
    mode: shadow
    priority: 20
    expected_task: detect
    expected_classes: [tatto]
    outputs:
      tatto: {kind: protected_box, target: tattoos}

  head_accessory_v1_seg:
    mode: assist
    priority: 80
    expected_task: segment
    expected_classes: [headWear]
    roi_priors: [hair, head_face]
    roi_scale: 1.65
    outputs:
      headWear: {kind: protected, target: head_accessory}

  foot_yolov8x_v2:
    mode: assist
    priority: 82
    expected_task: detect
    expected_classes: [foot]
    roi_priors: [left_foot_base, right_foot_base]
    roi_crop_labels: [left_foot, right_foot]
    roi_scale: 1.7
    outputs:
      foot: {kind: box_prompt, target: feet}

  foot_anime_yolo11m_v3:
    mode: disabled
    priority: 10
    expected_task: detect
    expected_classes: [foot]
    allowed_domains: [illustration]
    outputs:
      foot: {kind: box_prompt, target: feet}

  person_female_v1:
    mode: disabled
    priority: 5
    expected_task: segment
    expected_classes: [person_female]
    outputs:
      person_female: {kind: qa_only, target: person_silhouette}

  clothes_detection_tops:
    mode: shadow
    priority: 92
    expected_task: segment
    expected_classes: [female_clothes_top]
    roi_priors: [chest_upper_torso, left_breast, right_breast, abdomen_stomach]
    roi_scale: 1.3
    outputs:
      female_clothes_top: {kind: material_candidate, target: top_garment}

  anime_hair_v1:
    mode: disabled
    priority: 10
    expected_task: detect
    expected_classes: [hair]
    allowed_domains: [illustration]
    outputs:
      hair: {kind: box_prompt, target: hair}

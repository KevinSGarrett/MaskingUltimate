# Isolated CVAT v2.69.0 migration-rehearsal override (MF-P0-17.12).
#
# This file is deliberately separate from the production v2.24.0 override.
# Invoke it only from the frozen v2.69.0 source checkout with project name
# `cvat269` and `CVAT_HOST=cvat269.localhost`.  Every fixed container name and
# host port is unique so the validated v2.24.0 deployment can remain online.
name: cvat269

services:
  cvat_db:
    container_name: cvat269_db

  cvat_redis_inmem:
    container_name: cvat269_redis_inmem

  cvat_redis_ondisk:
    container_name: cvat269_redis_ondisk

  cvat_server:
    container_name: cvat269_server
    # Replace (do not merge) upstream's globally named Traefik routes. Both
    # Traefik instances watch the Docker socket, so duplicate `cvat` router
    # names would disable routing in a genuinely parallel deployment.
    labels: !override
      traefik.enable: "true"
      traefik.http.services.cvat269.loadbalancer.server.port: "8080"
      traefik.http.routers.cvat269.rule: >-
        Host(`${CVAT_HOST:-cvat269.localhost}`) &&
        (PathPrefix(`/api/`) || PathPrefix(`/static/`) || PathPrefix(`/admin`) ||
        PathPrefix(`/django-rq`))
      traefik.http.routers.cvat269.entrypoints: web
    volumes:
      - ${MASKFACTORY_DATA_PATH:-/mnt/c/Comfy_UI_Main_Masking/data}:/home/django/share:ro

  cvat_worker_utils:
    container_name: cvat269_worker_utils

  cvat_worker_import:
    container_name: cvat269_worker_import
    volumes:
      - ${MASKFACTORY_DATA_PATH:-/mnt/c/Comfy_UI_Main_Masking/data}:/home/django/share:ro

  cvat_worker_export:
    container_name: cvat269_worker_export
    volumes:
      - ${MASKFACTORY_DATA_PATH:-/mnt/c/Comfy_UI_Main_Masking/data}:/home/django/share:ro

  cvat_worker_annotation:
    container_name: cvat269_worker_annotation
    volumes:
      - ${MASKFACTORY_DATA_PATH:-/mnt/c/Comfy_UI_Main_Masking/data}:/home/django/share:ro

  cvat_worker_webhooks:
    container_name: cvat269_worker_webhooks

  cvat_worker_quality_reports:
    container_name: cvat269_worker_quality_reports

  cvat_worker_chunks:
    container_name: cvat269_worker_chunks
    volumes:
      - ${MASKFACTORY_DATA_PATH:-/mnt/c/Comfy_UI_Main_Masking/data}:/home/django/share:ro

  cvat_worker_consensus:
    container_name: cvat269_worker_consensus

  cvat_ui:
    container_name: cvat269_ui
    labels: !override
      traefik.enable: "true"
      traefik.http.services.cvat269-ui.loadbalancer.server.port: "8000"
      traefik.http.routers.cvat269-ui.rule: Host(`${CVAT_HOST:-cvat269.localhost}`)
      traefik.http.routers.cvat269-ui.entrypoints: web

  traefik:
    container_name: cvat269_traefik
    ports: !override
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:18090:8090"

  cvat_opa:
    container_name: cvat269_opa

  cvat_clickhouse:
    container_name: cvat269_clickhouse

  cvat_vector:
    container_name: cvat269_vector

  cvat_grafana:
    container_name: cvat269_grafana

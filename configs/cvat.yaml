version: "v2.24.0"
git_commit: "9fafd98f0c0588b775db8f98648569dfa48292b5"
checkout_path_windows: "C:/Comfy_UI_Main_Masking/cvat"
checkout_path_wsl: "/mnt/c/Comfy_UI_Main_Masking/cvat"
host: "127.0.0.1"
ui_url: "http://localhost:8080"
compose:
  project_name: "cvat"
  files:
    - "cvat/docker-compose.yml"
    - "cvat/components/serverless/docker-compose.serverless.yml"
    - "configs/cvat-compose.maskfactory.yml"
  public_ports: []
  localhost_ports: [8070, 8080, 8090]
share:
  host_path_windows: "C:/Comfy_UI_Main_Masking/data"
  host_path_wsl: "/mnt/c/Comfy_UI_Main_Masking/data"
  compose_variable: "MASKFACTORY_DATA_PATH"
  container_path: "/home/django/share"
  mode: "ro"
  services:
    - cvat_server
    - cvat_worker_import
    - cvat_worker_export
    - cvat_worker_annotation
    - cvat_worker_chunks
serverless:
  interactor: "sam2"
  deployment: "cpu"
  reason: "pipeline owns the GPU"
compatibility:
  docker_engine: "29.x"
  traefik_image: "traefik:v3.6.1"
  nuclio_helper_source: "alpine:3.17"
  nuclio_helper_alias: "gcr.io/iguazio/alpine:3.17"
  bootstrap_command: "python tools/bootstrap_cvat.py"
credentials:
  source: ".env"
  required_variables: [CVAT_USERNAME, CVAT_PASSWORD, CVAT_TOKEN]
  committed: false

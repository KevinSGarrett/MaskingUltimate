version: "v2.24.0"
api_url: "http://localhost:8080"
ui_url: "http://localhost:8080"
project:
  name: "MaskFactory_body_parts_v2_pilot"
  v1_project_name: "MaskFactory_body_parts_v1"
  ontology_version: "body_parts_v2"
  label_scope: "part_ids_0_65"
  label_source: "configs/ontology_v2.yaml"
  color_source: "configs/viz_v2.yaml"
  label_mapping_file: "data/cvat_v2/label_mapping.json"
  task_records_dir: "data/cvat_v2/tasks"
  assignee: "kevin"
  segment_size: 1
review_crops:
  chest:
    labels: [chest_upper_torso, left_breast, right_breast, left_areola, right_areola, left_nipple, right_nipple]
    padding_fraction: 0.20
    fallback_y_fraction: [0.12, 0.58]
    zoom_percent: [400, 800]
  pelvic:
    labels: [pelvic_region, vulva, penis_shaft, glans_penis, left_scrotal_region, right_scrotal_region]
    padding_fraction: 0.25
    fallback_y_fraction: [0.42, 0.84]
    zoom_percent: [400, 800]
credentials:
  env_file: ".env"
  required_variables: [CVAT_USERNAME, CVAT_PASSWORD, CVAT_TOKEN]
  committed: false

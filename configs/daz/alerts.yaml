schema_version: 1.0.0
local_only: true
severity_order: [info, warning, high, critical]
rules:
  - rule_id: database_corrupt
    metric_path: machine.database_integrity
    operator: ne
    threshold: ok
    severity: critical
    action: stop_ingestion_preserve_evidence
  - rule_id: accepted_semantic_defect
    metric_path: pipeline.accepted_semantic_defects
    operator: gt
    threshold: 0
    severity: critical
    action: stop_ingestion_preserve_evidence
  - rule_id: source_asset_in_git
    metric_path: machine.source_assets_in_git
    operator: gt
    threshold: 0
    severity: critical
    action: stop_ingestion_preserve_evidence
  - rule_id: hard_disk_floor
    metric_path: machine.f_free_bytes
    operator: lt
    threshold: 107374182400
    severity: high
    action: drain_affected_work
    suppression_group: f_disk_floor
  - rule_id: repeated_worker_crash
    metric_path: pipeline.worker_crashes
    operator: gte
    threshold: 3
    severity: high
    action: drain_affected_work
  - rule_id: mapping_mismatch
    metric_path: pipeline.mapping_mismatches
    operator: gt
    threshold: 0
    severity: high
    action: drain_affected_work
  - rule_id: soft_disk_floor
    metric_path: machine.f_free_bytes
    operator: lt
    threshold: 161061273600
    severity: warning
    action: pause_planning_investigate
    suppression_group: f_disk_floor
  - rule_id: rising_retry_rate
    metric_path: pipeline.retry_rate
    operator: gte
    threshold: 0.2
    severity: warning
    action: pause_planning_investigate
  - rule_id: stale_certificate
    metric_path: pipeline.stale_certificates
    operator: gt
    threshold: 0
    severity: warning
    action: pause_planning_investigate
  - rule_id: new_asset_snapshot
    metric_path: corpus.asset_snapshot_changes
    operator: gt
    threshold: 0
    severity: info
    action: report
  - rule_id: planned_maintenance
    metric_path: machine.maintenance_planned
    operator: eq
    threshold: true
    severity: info
    action: report

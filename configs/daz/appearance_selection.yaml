schema_version: 1.0.0
policy_version: 1.0.0
anatomy_configurations: [adult_male_anatomy, adult_female_anatomy]
hair_modes: [none, required]
wardrobe_states:
  unclothed: {construction: none, minimum_items: 0, allowed_fit_profiles: []}
  underwear_only: {construction: underwear, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted, regular]}
  swimwear: {construction: swimwear, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted, regular]}
  minimal_clothing: {construction: partial, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted, regular, loose]}
  tight_fitted: {construction: full, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted]}
  standard_casual: {construction: full, minimum_items: 1, allowed_fit_profiles: [fitted, regular, loose]}
  loose_clothing: {construction: full, minimum_items: 1, allowed_fit_profiles: [loose, very_loose]}
  layered_clothing: {construction: layered, minimum_items: 2, allowed_fit_profiles: [skin_tight, fitted, regular, loose, very_loose]}
  formal: {construction: full, minimum_items: 1, allowed_fit_profiles: [fitted, regular, loose]}
  athletic: {construction: full, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted, regular, loose]}
  sleepwear: {construction: full, minimum_items: 1, allowed_fit_profiles: [fitted, regular, loose, very_loose]}
  outerwear: {construction: layered, minimum_items: 2, allowed_fit_profiles: [fitted, regular, loose, very_loose]}
  workwear_or_uniform_generic: {construction: full, minimum_items: 1, allowed_fit_profiles: [fitted, regular, loose]}
  costume_or_stylized_adult: {construction: full, minimum_items: 1, allowed_fit_profiles: [skin_tight, fitted, regular, loose, very_loose]}
layer_order:
  underwear: 10
  inner: 20
  base: 30
  mid: 40
  outer: 50
  accessory: 60
allowed_dynamic_behaviors: [static, deterministic_baked]
required_anatomy_asset_class: anatomy_geograft
required_anatomy_mapping_requirement: asset_specific
required_wardrobe_mapping_requirements: [inherited_base, asset_specific]

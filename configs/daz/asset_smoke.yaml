schema_version: 1.0.0
policy_version: 1.0.0
repetitions: 2
separate_process_per_repetition: true
required_artifact_roles: [beauty_preview, silhouette, instance_id, mapping_pass]
universal_checks:
  - registry_record_valid
  - dependencies_resolved
  - required_plugins_resolved
  - clean_scene_baseline
  - baseline_scene_capture
  - post_apply_scene_capture
  - missing_referenced_files_zero
  - unknown_external_roots_zero
  - finite_properties_geometry
  - low_cost_render_nonempty
  - renderer_profile_unchanged
  - output_path_unchanged
  - unexpected_dialog_zero
  - fatal_log_zero
  - repeatability
profiles:
  figure:
    asset_classes: [figure_base, character_preset, full_character_shape]
    fixture_ids: [g9_neutral]
    checks: [adult_generation, skeleton_family, topology_fingerprint, canonical_neutral_pose, surfaces_resolved]
  morph:
    asset_classes: [head_morph, body_morph, combined_morph, age_morph, corrective_morph, hd_morph]
    fixture_ids: [g9_neutral, g9_arms_up, g9_seated, g9_crouched]
    checks: [intended_base, changed_controllers_enumerated, bounded_values, topology_policy, rig_adjustment_valid, coarse_intersection]
  material:
    asset_classes: [material_skin, material_eye, material_makeup, material_body_detail]
    fixture_ids: [g9_neutral, light_soft_studio, light_high_contrast]
    checks: [surface_scope, texture_maps_resolved, shader_supported, opacity_displacement_finite, no_unintended_invisibility, id_override_reversible]
  hair:
    asset_classes: [hair_fitted, hair_prop, facial_hair]
    fixture_ids: [g9_neutral, g9_head_neck_extremes]
    checks: [fit_follow_target, render_visibility, alpha_transmission_resolved, silhouette_alpha_agreement, head_shoulder_penetration, extreme_pose_attachment]
  wardrobe:
    asset_classes: [wardrobe_top, wardrobe_bottom, wardrobe_one_piece, wardrobe_underwear, wardrobe_swimwear, wardrobe_outerwear, wardrobe_glove, wardrobe_sock, wardrobe_footwear, wardrobe_headwear, accessory_wearable]
    fixture_ids: [g9_neutral, g9_arms_up, g9_seated, g9_crouched]
    checks: [fit_follow_target, expected_pieces, texture_maps_resolved, articulation_stress, geometry_integrity, clothing_mapping_coverage, layer_order, simulation_repeatability]
  pose:
    asset_classes: [pose_full_body, pose_partial_upper, pose_partial_lower, pose_hand_left, pose_hand_right, pose_foot, animation]
    fixture_ids: [g9_neutral]
    checks: [shape_material_unchanged, root_transform_classified, joint_limits_finite, side_identity, contact_points, self_intersection, canonical_pose_export]
  expression:
    asset_classes: [expression]
    fixture_ids: [g9_neutral]
    checks: [face_control_scope, body_morph_unchanged, eye_mouth_geometry_finite, bounded_strengths, head_mapping_stable]
  anatomy:
    asset_classes: [anatomy_geograft, other_geograft]
    fixture_ids: [g9_neutral]
    checks: [intended_base, polygon_replacement, geograft_fingerprint, required_mapping, seam_tolerance, id_exclusivity, v1_fallback]
  scene_component:
    asset_classes: [prop_handheld, prop_occluder, support_surface, camera_preset, light_preset, environment_indoor, environment_outdoor, backdrop, hdri, scene_preset, render_preset, simulation_preset]
    fixture_ids: [g9_neutral]
    checks: [unrelated_scene_state_preserved, bounded_properties, undeclared_people_mirrors_zero, geometry_material_ids, occlusion_support_classified, render_settings_unchanged]
  tool:
    asset_classes: [script, plugin, converter, compatibility_resource]
    fixture_ids: [empty_scene]
    checks: [entrypoint_contract, side_effect_diff, declared_runtime_dependency, deterministic_exit]
  documentation:
    asset_classes: [documentation_support]
    fixture_ids: [empty_scene]
    checks: [non_executable, support_references_resolve]
quarantine_codes:
  unknown_asset_type: Q-ASSET-001
  missing_dependency: Q-ASSET-002
  file_hash_conflict: Q-ASSET-003
  unsupported_generation: Q-ASSET-004
  required_plugin_missing: Q-ASSET-005
  external_path_reference: Q-ASSET-006
  missing_texture: Q-ASSET-007
  load_error: Q-ASSET-008
  unexpected_dialog: Q-ASSET-009
  renderer_profile_mutation: Q-ASSET-010
  topology_changed_unmapped: Q-ASSET-011
  geometry_nan_or_explosion: Q-ASSET-012
  excessive_intersection: Q-ASSET-013
  fit_or_follow_failure: Q-ASSET-014
  mapping_incomplete: Q-ASSET-015
  alpha_mask_unreliable: Q-ASSET-016
  simulation_nondeterministic: Q-ASSET-017
  unsupported_character_configuration: Q-ASSET-018
  anatomy_configuration_unknown: Q-ASSET-019
  repeatability_failure: Q-ASSET-020
  timeout_or_crash: Q-ASSET-021
  duplicate_or_shadow_conflict: Q-ASSET-022

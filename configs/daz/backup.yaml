schema_version: 1.0.0
tier: A
include_roots:
  - 00_control
  - 04_runtime/runtime_snapshots
  - 05_registry
  - 07_mappings
  - 09_generation
  - 10_queue/queue.sqlite
  - 14_scene_packages
  - 15_datasets
required_restore_categories:
  control: [00_control]
  registry: [05_registry]
  mapping: [07_mappings]
  queue: [10_queue/queue.sqlite]
conditional_restore_categories:
  recipe: [09_generation]
  package_metadata: [14_scene_packages]
  dataset_model_lineage: [15_datasets]
reject_symlinks: true
verify_hashes: true
require_empty_restore_root: true

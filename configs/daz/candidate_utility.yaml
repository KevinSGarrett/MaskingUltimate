schema_version: 1.0.0
ranker_version: 1.0.0
positive_weights:
  canonical_coverage_deficit_gain: 0.30
  high_risk_intersection_gain: 0.20
  label_visibility_gain: 0.15
  asset_diversity_gain: 0.10
  failure_mining_priority: 0.10
  domain_randomization_gain: 0.05
  multi_person_identity_gain: 0.05
  recency_need: 0.05
penalties:
  - incompatibility_penalty
  - dominance_penalty
  - recent_repetition_penalty
  - predicted_rejection_cost
hard_constraints:
  - registry_complete
  - mapping_eligible
  - compatibility_eligible
  - capacity_eligible
  - ontology_eligible
ranking:
  order: [utility_desc, asset_diversity_gain_desc, candidate_id_asc]
  select_count: 1
  nonfinite_rejected: true
  all_infeasible_is_honest_unsatisfied: true
authority:
  stage: technical_candidate_selection
  selection_is_recipe: false
  selection_is_render_authority: false
  selection_creates_gold: false
  synthetic_counts_close_real_deficits: false
publication: {immutable: true, atomic: true}

schema_version: 1.0.0
fixture_only: true
required_scenarios: [disk_full, drive_loss, gpu_contention, db_corruption, crash, popup, oom]
disk_full:
  fixture_capacity_bytes: 4096
  simulated_free_bytes: 1024
  required_free_bytes: 2048
  action: pause_and_drain
  partial_acceptance_allowed: false
drive_loss:
  action: pause_and_drain
  partial_acceptance_allowed: false
db_corruption:
  preserve_corrupt_original: true
  restore_to_new_path: true
  duplicate_acceptance_allowed: false
crash:
  missing_terminal_result_action: fail
  partial_acceptance_allowed: false
popup:
  action: quarantine
  process_tree_termination_required: true
  ui_input_allowed: false
gpu_contention:
  action: wait_then_timeout
  concurrent_gpu_work_allowed: false
  automatic_stale_lock_reclamation_allowed: false
oom:
  maximum_lower_cost_retries: 1
  persistent_failure_action: quarantine
  allowed_override_fields: [render_samples, tile_size]
  protected_recipe_fields:
    - operation
    - bundle_version
    - content_directories
    - payload.renderer
    - payload.annotation_width
    - payload.annotation_height
    - payload.ontology_id

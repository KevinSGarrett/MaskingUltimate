schema_version: 1.0.0
policy_version: 1.0.0
scope: final_camera_prominence_p_index
maximum_people: 4
minimum_visible_area_fraction: 0.04
prominence_formula: visible_pixels_divided_by_final_output_pixels
deterministic_tie_break: [prominence_desc, visible_area_desc, construction_id_asc]
construction_map:
  encoding: uint16_png
  background_value: 0
  decode_filter: nearest_neighbor_exact
  unknown_ids_rejected: true
camera:
  normalized_readback_must_equal_final_camera: true
retry:
  maximum_framing_retries: 2
  below_minimum_when_promotion_required: retry_framing
  below_minimum_otherwise: reject_resample
  partial_mapping_forbidden: true

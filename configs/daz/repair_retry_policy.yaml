schema_version: 1.0.0
policy_version: 1.0.0
authority_freeze_fields: [ontology_sha256, mapping_set_sha256, label_table_sha256, truth_tier, training_weight_sha256, required_validator_set_sha256]
retry_budgets:
  same_recipe_clean_rerender: 1
  camera_support_correction: 2
  cloth_hair_settle: 1
  asset_combination_replacement: 3
  full_recipe_regeneration: 5
repair_rules:
  CAMERA_RECENTER:
    reason_code: ASSEMBLY_FRAMING_INVALID
    retryability: adjusted_recipe
    reason_family: framing
    retry_class: camera_support_correction
    action: camera_recenter_distance
    delta_fields: [camera_target_offset_cm, distance_delta_cm]
  CAMERA_CLIP_PLANES:
    reason_code: ASSEMBLY_FRAMING_INVALID
    retryability: adjusted_recipe
    reason_family: camera_clip
    retry_class: camera_support_correction
    action: camera_clip_planes
    delta_fields: [near_plane_delta_cm, far_plane_delta_cm]
  SUPPORT_TRANSLATION:
    reason_code: ASSEMBLY_FIT_INVALID
    retryability: adjusted_recipe
    reason_family: support_contact
    retry_class: camera_support_correction
    action: support_contact_translation
    delta_fields: [construction_id, translation_delta_cm]
  CLOTH_HAIR_SETTLE:
    reason_code: ASSEMBLY_FIT_INVALID
    retryability: adjusted_recipe
    reason_family: cloth_hair_settle
    retry_class: cloth_hair_settle
    action: rerun_pinned_simulation_cache
    delta_fields: [node_id, simulation_seed, cache_sha256]
  SMOOTHING_FIT_ADJUSTMENT:
    reason_code: GEOMETRY_PENETRATION_EXCESS
    retryability: adjusted_recipe
    reason_family: mild_hair_garment_penetration
    retry_class: cloth_hair_settle
    action: configured_smoothing_fit_adjustment
    delta_fields: [node_id, adjustment_profile_id]
  PLACEMENT_SEPARATION:
    reason_code: GEOMETRY_PENETRATION_EXCESS
    retryability: adjusted_recipe
    reason_family: unintended_near_contact
    retry_class: camera_support_correction
    action: placement_separation
    delta_fields: [construction_id, translation_delta_cm]
  CLEAN_WORKER_RERENDER:
    reason_code: RENDER_PROCESS_FAILED
    retryability: same_recipe
    reason_family: transient_render
    retry_class: same_recipe_clean_rerender
    action: clean_worker_rerender
    delta_fields: [worker_restart_nonce]
  COVERAGE_ASSET_POSE_RESAMPLE:
    reason_code: CORPUS_COVERAGE_DEFICIT
    retryability: adjusted_recipe
    reason_family: coverage_deficit
    retry_class: asset_combination_replacement
    action: resample_compatible_asset_pose
    delta_fields: [replacement_stream_seed, excluded_asset_ids]
  FULL_RECIPE_REGENERATION:
    reason_code: RECIPE_RANGE_INVALID
    retryability: adjusted_recipe
    reason_family: recipe_regeneration
    retry_class: full_recipe_regeneration
    action: regenerate_from_clean_registry_snapshot
    delta_fields: [replacement_master_seed]
non_repairable_reason_codes:
  - ASSEMBLY_NODE_MISMATCH
  - ASSEMBLY_TRANSFORM_INVALID
  - ASSET_CERTIFICATE_INVALID
  - ASSET_DEPENDENCY_MISSING
  - ASSET_HASH_MISMATCH
  - CONTRACT_REQUIRED_FIELD_MISSING
  - CONTRACT_SCHEMA_INVALID
  - CONTRACT_VERSION_UNKNOWN
  - GEOMETRY_NONFINITE
  - GEOMETRY_TOPOLOGY_MISMATCH
  - GEOMETRY_VISIBILITY_INVALID
  - ID_CODEC_INVALID
  - ID_OWNERSHIP_INVALID
  - ID_UNKNOWN_VALUE
  - MULTI_COUNT_MISMATCH
  - MULTI_EXCLUSIVITY_INVALID
  - MULTI_IDENTITY_INVALID
  - MULTI_RELATIONSHIP_INVALID
  - PACKAGE_HASH_MISMATCH
  - PACKAGE_LINEAGE_INVALID
  - PACKAGE_SCHEMA_INVALID
  - PACKAGE_TRUTH_CONTRACT_INVALID
  - RECIPE_NONDETERMINISTIC
  - RECIPE_UNRESOLVABLE
  - RENDER_DIMENSION_MISMATCH
  - RENDER_HASH_MISMATCH
  - RENDER_PASS_SET_INVALID
  - RENDER_REPLAY_DRIFT
  - SEMANTIC_BOUNDARY_INVALID
  - SEMANTIC_MAPPING_INVALID
quarantine_reason_codes: [ASSET_DEPENDENCY_MISSING, ASSET_HASH_MISMATCH, GEOMETRY_TOPOLOGY_MISMATCH, ID_OWNERSHIP_INVALID, ID_UNKNOWN_VALUE, MULTI_EXCLUSIVITY_INVALID, MULTI_IDENTITY_INVALID, SEMANTIC_MAPPING_INVALID]
numeric_limits:
  scalar_delta_cm_abs_max: 25.0
  vector_delta_cm_abs_max: 10.0
  near_plane_delta_cm_abs_max: 5.0
  far_plane_delta_cm_abs_max: 100.0
  seed_max: 18446744073709551615
publication: {immutable: true, hash_chained: true, full_revalidation_required: true, coverage_deficit_on_exhaustion: true}

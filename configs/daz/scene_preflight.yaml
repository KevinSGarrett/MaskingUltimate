schema_version: 1.0.0
policy_version: 1.0.0
scope: solo_scene_preflight
promotion:
  minimum_visible_area_fraction: 0.04
  maximum_people: 1
  require_exact_declared_person_count: true
  deterministic_tie_break: [prominence_desc, visible_area_desc, construction_id_asc]
framing_profiles:
  full_body_margin: {visible_body_fraction: [0.98, 1.0], off_frame_fraction: [0.0, 0.0], bbox_height_fraction: [0.50, 0.94], required_regions: [head, torso, left_hand, right_hand, left_foot, right_foot]}
  full_body_tight: {visible_body_fraction: [0.98, 1.0], off_frame_fraction: [0.0, 0.0], bbox_height_fraction: [0.75, 0.99], required_regions: [head, torso, left_hand, right_hand, left_foot, right_foot]}
  three_quarter_body: {visible_body_fraction: [0.60, 0.85], off_frame_fraction: [0.15, 0.40], bbox_height_fraction: [0.70, 1.0], required_regions: [head, torso]}
  waist_up: {visible_body_fraction: [0.40, 0.70], off_frame_fraction: [0.30, 0.60], bbox_height_fraction: [0.65, 1.0], required_regions: [head, torso]}
  chest_head: {visible_body_fraction: [0.20, 0.50], off_frame_fraction: [0.50, 0.80], bbox_height_fraction: [0.55, 1.0], required_regions: [head, torso]}
  head_shoulders: {visible_body_fraction: [0.08, 0.30], off_frame_fraction: [0.70, 0.92], bbox_height_fraction: [0.45, 1.0], required_regions: [head]}
  close_up_specialist: {visible_body_fraction: [0.01, 0.30], off_frame_fraction: [0.70, 0.99], bbox_height_fraction: [0.20, 1.0], required_regions: [specialist_target]}
  intentional_truncation: {visible_body_fraction: [0.20, 0.95], off_frame_fraction: [0.05, 0.80], bbox_height_fraction: [0.35, 1.0], required_regions: [head, torso]}
  negative_space: {visible_body_fraction: [0.90, 1.0], off_frame_fraction: [0.0, 0.10], bbox_height_fraction: [0.35, 0.75], required_regions: [head, torso]}
  off_center: {visible_body_fraction: [0.80, 1.0], off_frame_fraction: [0.0, 0.20], bbox_height_fraction: [0.45, 0.95], required_regions: [head, torso]}
collision_limits:
  self_body: {maximum_depth_mm: 2.0, maximum_volume_cc: 0.50, exempt_allowed: false}
  hair_body: {maximum_depth_mm: 3.0, maximum_volume_cc: 1.00, exempt_allowed: false}
  garment_body: {maximum_depth_mm: 2.0, maximum_volume_cc: 2.00, exempt_allowed: true}
  garment_garment: {maximum_depth_mm: 2.0, maximum_volume_cc: 2.00, exempt_allowed: true}
  person_person: {maximum_depth_mm: 0.0, maximum_volume_cc: 0.00, exempt_allowed: false}
  person_prop_support: {maximum_depth_mm: 2.0, maximum_volume_cc: 0.50, exempt_allowed: false}
contact:
  intended_distance_mm: [0.0, 4.0]
  maximum_penetration_mm: 2.0
  minimum_normal_dot: 0.0
  maximum_support_drift_mm: 4.0
  all_declared_support_contacts_required: true
  floating_prop_rejected: true
geometry:
  finite_values_required: true
  camera_clipping_rejected: true
  unexpected_renderable_nodes_rejected: true
  undeclared_people_rejected: true
  catastrophic_geometry_rejected: true
  broad_phase_required: true
  narrow_phase_required_for_overlaps: true
repair:
  deterministic_camera_support_correction_maximum: 2
  allowed_codes: [GEOMETRY_FRAMING_RECENTERABLE, GEOMETRY_CAMERA_CLIP_REPAIRABLE, GEOMETRY_SUPPORT_DRIFT_REPAIRABLE]
  new_recipe_revision_required: true

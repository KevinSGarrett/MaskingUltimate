schema_version: 1.0.0
policy_version: 1.0.0
recipe:
  allowed_ontology_names: [body_parts_v1, body_parts_v2]
  allowed_render_profile_ids: [engineering_minimal, training_standard, training_relationship, diagnostic_full, rgb_variant, training_relationship_1024_v1]
  configuration_matrix:
    "1": [solo]
    "2": [separated, overlap, contact]
    "3": [separated, overlap, contact]
    "4": [separated, overlap, contact]
  maximum_storage_gib: 4.0
  maximum_gpu_vram_gib: 24.0
  cost_warning_fraction: 0.85
assembly:
  accepted_runtime_warning_codes: [AUTO_FOLLOW_APPLIED, SUBDIVISION_APPLIED]
  figure_scale_range: [0.5, 2.0]
  maximum_absolute_world_coordinate_cm: 100000.0
  numeric_tolerance: 0.000001
geometry:
  allowed_subdivision_levels: [0, 1, 2, 3]
  allowed_smoothing_modes: [none, angle_weighted, subdivision]
  recognized_topology_modifiers: [subdivision, smoothing, geograft]
  minimum_visible_area_fraction: 0.01
  maximum_off_frame_fraction: 0.99
  collision_limits:
    self_body: {maximum_depth_mm: 2.0, maximum_volume_cc: 0.5}
    hair_body: {maximum_depth_mm: 3.0, maximum_volume_cc: 1.0}
    garment_body: {maximum_depth_mm: 2.0, maximum_volume_cc: 2.0}
    garment_garment: {maximum_depth_mm: 2.0, maximum_volume_cc: 2.0}
    person_person: {maximum_depth_mm: 0.0, maximum_volume_cc: 0.0}
    person_prop_support: {maximum_depth_mm: 2.0, maximum_volume_cc: 0.5}
  tolerated_intentional_contact_depth_mm: 2.0
  tolerated_intentional_contact_volume_cc: 0.5

# configs/external_sources.yaml
# External foundation registry (MF-P0-09; spec: doc 16, model details doc 06 §3).
#
# Provenance record for every external model/tool provider and dataset MaskFactory
# builds on. Fields per provider (MF-P0-09.02): source_url, license, version,
# local_path, output_type, role, authority_level. `verify_license: true` flags an
# entry whose exact license/content terms still need explicit confirmation.
#
# CORE RULE (doc 16 §1): no single external model or workflow is mask authority.
# External tools produce candidates/priors/boxes/landmarks/masks; MaskFactory gold
# is produced only through the active truth-tier and certification contracts.

schema_version: 2.0.0
use_profile: private_personal_noncommercial
distribution_allowed: false
commercial_deployment: false
content_compatibility:
  adult_nonexplicit: allowed
  consensual_explicit_adult: allowed

meta:
  spec: "doc 16 (External Foundation Bootstrap); model checkpoints doc 06 §3"
  core_rule: "No single external model/workflow is mask authority (doc 16 §1)."
  license_note: >
    MaskFactory is private, personal, local, noncommercial, and not distributed.
    Noncommercial licenses are not blockers when all other terms permit this use.
    Exact license text, source, version, and content restrictions remain required.
    Content compatibility is independent of commercial status. A model's draft or
    output provenance does not erase restrictions on use of the model or weights;
    gold mask is a different question from redistributing/serving its weights —
    all applicable terms remain enforceable.

  production_meaning: "active local MaskFactory path; never commercial deployment"

hard_exclusions:
  sapiens2:
    source_url: "https://github.com/facebookresearch/sapiens2/blob/main/LICENSE.md"
    license: "Sapiens2 License, current upstream text"
    reason: "License section 1(b)(vi)(vii) prohibits pornographic use."
    install_allowed: false
    register_allowed: false
    benchmark_allowed: false
    training_allowed: false
    production_allowed: false
    content_compatibility:
      adult_nonexplicit: unclear
      consensual_explicit_adult: prohibited


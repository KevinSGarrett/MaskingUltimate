schema_version: "1.0.0"
map_id: "maskfactory-gold-volume-sources-read-when-present-v1"
# Read-when-present path map for MaskedWarehouse / reference / DAZ corpora used as
# tournament *inputs*. Removable F: USB candidates are probed when present and
# selected for read-only access; they are NEVER junctioned into critical runtime
# (data/, models/, Docker VHDX, WSL live disks).
claim_boundary:
  read_when_present_only: true
  never_junction_critical_runtime_to_usb: true
  never_relocate_data_models_docker_to_removable: true
  never_treat_external_labels_as_gold: true
  never_force_register_champion: true
  inputs_only: true
critical_runtime_forbidden_on_removable:
  - "data/"
  - "models/"
  - "Docker VHDX / docker_data.vhdx"
  - "WSL live Ubuntu ext4.vhdx (runtime mount)"
sources:
  maskedwarehouse:
    role: tournament_external_supervision_input
    description: "Local MaskedWarehouse external-supervision corpora (labels are train-only; not MaskFactory gold)."
    required_child_any:
      - "Body"
      - "CelebAMask-HQ"
      - "LaPa"
    candidates:
      - path: "C:\\Comfy_UI_Main\\MaskedWarehouse"
        media: fixed_local
        priority: 10
      - path: "F:\\MaskedWarehouse"
        media: removable_usb
        priority: 20
      - path: "F:\\MaskFactory_Offload_20260714\\Comfy_UI_Main\\MaskedWarehouse"
        media: removable_usb
        priority: 30
  reference_library:
    role: tournament_reference_benchmark_input
    description: "Ultimate Masking reference library (no-truth benchmark/retrieval input)."
    required_child_any:
      - "manifests"
      - "benchmark_reference"
      - "retrieval_reference"
    candidates:
      - path: "F:\\Reference_Images\\Ultimate_Masking_Reference_Images"
        media: removable_usb
        priority: 10
      - path: "C:\\Temp\\MaskFactory_Reference_Library"
        media: fixed_local
        priority: 20
  daz:
    role: tournament_synthetic_geometry_input
    description: "Governed F:\\DAZ tree (exact geometry / synthetic supervision; not human-anchor gold)."
    required_child_any:
      - "00_control"
      - "15_datasets"
      - "16_maskfactory_exports"
    candidates:
      - path: "F:\\DAZ"
        media: removable_usb
        priority: 10
dataset_hints:
  maskedwarehouse:
    - relative: "Body/LV-MHP-v1"
      use: multi_person_full_body_parsing
    - relative: "CelebAMask-HQ"
      use: face_components
    - relative: "LaPa"
      use: face_parsing
    - relative: "Body/archive"
      use: seven_group_body_color
    - relative: "Body/UniDataPro_swimsuit-human-segmentation-dataset"
      use: clothing_body_color_preview
  daz:
    - relative: "12_renders"
      use: rendered_rgb
    - relative: "13_annotations"
      use: daz_annotations
    - relative: "15_datasets"
      use: synthetic_dataset_builds
    - relative: "16_maskfactory_exports"
      use: maskfactory_intake_exports
  reference_library:
    - relative: "manifests/reference_library.sqlite"
      use: indexed_representatives
    - relative: "benchmark_reference"
      use: no_truth_benchmark

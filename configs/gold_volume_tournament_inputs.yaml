# Governed gold-volume tournament input path map (read-only).
#
# Wires the multi-provider autonomous tournament to the live MaskedWarehouse,
# reference-library, and DAZ corpora. Sources are INPUT ONLY — never write
# candidates, packages, or sidecars into these roots. Tournament outputs stay
# under runs/ / runtime_artifacts/ / data/packages.
#
# Host paths are absolute Windows roots (F: USB currently hosts reference + DAZ;
# MaskedWarehouse remains on C:\Comfy_UI_Main). Container mounts (docker/compose.gpu.yml)
# bind the same roots read-only under /gold/*.

schema_version: "1.0.0"
map_id: maskfactory_gold_volume_tournament_inputs_v1
access_mode: read_only
authority: gold_volume_tournament_input_path_map
governing_configs:
  - configs/autonomous_masks.yaml
  - configs/autonomy_autonomous_gold_profile.yaml
  - configs/reference_library.yaml
  - configs/maskedwarehouse_inventory.json
claim_boundary:
  wiring_only: true
  does_not_claim_gold: true
  does_not_claim_tournament_pass: true
  does_not_claim_champions: true
  external_labels_are_not_gold: true
  daz_is_weighted_pseudo_train_only: true

volumes:
  maskedwarehouse:
    role: external_supervision_corpus
    truth_authority: none
    host_root: 'C:\Comfy_UI_Main\MaskedWarehouse'
    container_root: /gold/maskedwarehouse
    mount_mode: ro
    inventory_ref: configs/maskedwarehouse_inventory.json
    datasets:
      celebamask_hq: 'C:\Comfy_UI_Main\MaskedWarehouse\CelebAMask-HQ'
      lapa: 'C:\Comfy_UI_Main\MaskedWarehouse\LaPa'
      lv_mhp_v1: 'C:\Comfy_UI_Main\MaskedWarehouse\Body\LV-MHP-v1'
      swimsuit_preview: 'C:\Comfy_UI_Main\MaskedWarehouse\Body\UniDataPro_swimsuit-human-segmentation-dataset'
      body_archive: 'C:\Comfy_UI_Main\MaskedWarehouse\Body\archive'

  reference:
    role: unlabeled_reference_corpus
    truth_authority: none
    host_root: 'F:\Reference_Images'
    container_root: /gold/reference
    mount_mode: ro
    output_root: 'F:\Reference_Images\Ultimate_Masking_Reference_Images'
    database: 'F:\Reference_Images\Ultimate_Masking_Reference_Images\manifests\reference_library.sqlite'
    policy_ref: configs/reference_library.yaml

  daz:
    role: synthetic_geometry_exact_weighted_pseudo
    truth_authority: weighted_pseudo_label
    training_weight: 0.20
    holdout_eligible: false
    gold_eligible: false
    host_root: 'F:\DAZ'
    container_root: /gold/daz
    mount_mode: ro
    root_uuid: 6bd1b3ba-162a-400b-96dc-e4951b892a04
    volume_unique_id: '\\?\Volume{1aa3276c-0000-0000-0000-100000000000}\'
    path_registry: 'F:\DAZ\00_control\path_registry.json'
    root_identity: 'F:\DAZ\00_control\root_identity.json'
    tournament_subroots:
      renders: 'F:\DAZ\12_renders'
      annotations: 'F:\DAZ\13_annotations'
      datasets: 'F:\DAZ\15_datasets'
      exports: 'F:\DAZ\16_maskfactory_exports'

container_env:
  MASKFACTORY_GOLD_VOLUME_MAP: /opt/maskfactory/configs/gold_volume_tournament_inputs.yaml
  MASKFACTORY_GOLD_MASKEDWAREHOUSE: /gold/maskedwarehouse
  MASKFACTORY_GOLD_REFERENCE: /gold/reference
  MASKFACTORY_GOLD_DAZ: /gold/daz

compose_overlay: docker/compose.gold-volumes.yml
compose_usage: >-
  docker compose -f docker/compose.gpu.yml -f docker/compose.gold-volumes.yml
  run --rm maskfactory-train
compose_bind_mounts:
  - source: 'C:/Comfy_UI_Main/MaskedWarehouse'
    target: /gold/maskedwarehouse
    read_only: true
  - source: 'F:/Reference_Images'
    target: /gold/reference
    read_only: true
  - source: 'F:/DAZ'
    target: /gold/daz
    read_only: true

schema_version: "1.0.0"
policy_id: maskfactory-bridge-mode-a-vertical-slice-v1
policy_version: "1.0.0"
canonicalization:
  algorithm: maskfactory-canonical-json-v1
  excluded_top_level_fields:
    - policy_sha256
exact_use_scope: production_conditioning
person_mode: single_person
required_stages:
  - adopted_package_read
  - adapter_conformance
  - use_eligibility
  - identity_binding
  - handoff_journal
  - downstream_evidence_envelope
external_main_dependencies:
  - adopted_integration_release_clean_install
  - pinned_main_adapter_execution
  - comfyui_inpaint_edit_pass
  - main_result_history_receipt
allowed_branch_outcomes:
  - producer_partial
  - rejected
  - accepted
claim_boundary:
  fixture_truth_tier: synthetic_contract_fixture
  main_adapter_required_for_completion: true
  comfyui_execution_required_for_completion: true
reason_codes:
  - package_read_rejected
  - wrapper_not_active
  - adapter_conformance_rejected
  - use_eligibility_rejected
  - identity_chain_incomplete
  - handoff_journal_invalid
  - downstream_receipt_fabricated
  - main_adapter_execution_absent
  - comfyui_result_history_absent
  - raw_status_escalation
  - eligible

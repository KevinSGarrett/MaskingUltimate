protected_classes:
- other_person
- occluding_object
- support_surface
- accessory_or_prop
boundary_rules:
  frame_remainder:
    rule: all pixels not owned by any foreground PART label
  visible_contour:
    rule: visible pixel contour; never infer hidden extent
  hair_50pct:
    rule: hair owns occluded face/body pixels; wisps use 50 percent opacity boundary
  head_face:
    rule: face plus ears by default and scalp skin visible through partings
  neck_clavicle:
    rule: jawline or hair boundary down to clavicle line
  torso_front:
    rule: front torso anatomical lines and visible fabric-defined contours
  belly_carveout:
    rule: navel depression carved out of abdomen_stomach
  joint_0_6:
    rule: perpendicular keypoint band height 0.6 times local limb width
  wrist_0_5:
    rule: perpendicular wrist band height 0.5 times local limb width
  hand_mcp:
    rule: hand base begins after wrist; fingers begin at MCP knuckle line
  foot_mtp:
    rule: foot base excludes toes beginning at metatarsophalangeal line
  glute_back:
    rule: gluteal fold to iliac crest, split at body midline
  densepose_surface:
    rule: front/back ownership by DensePose surface majority
  protected_visible:
    rule: visible protected object/person contour in this instance crop
  script_formula:
    rule: exact script-generated result of the registered formula
  geometry_projected:
    rule: geometry estimate kept separate from visible truth
projected_templates:
- amodal_<part>
- inpaint_<part>_d<k>f<f>

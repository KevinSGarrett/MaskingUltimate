schema_version: "1.0.0"
policy_id: maskfactory-operational-authority-lattice
policy_version: "1.0.0"
canonicalization:
  algorithm: maskfactory-canonical-json-v1
  excluded_top_level_fields:
    - policy_sha256
access_modes:
  - none
  - mode_a_package_read
  - mode_b_live_predict
  - mode_b_live_refine
actors:
  - maskfactory_producer
  - maskfactory_training_governance
  - human_reviewer
  - main_controller
  - llm_vlm
  - provider
actions:
  - evaluate_use
  - reject
  - derive
  - grant_operational_authority
  - revoke_operational_authority
  - assign_training_truth
  - revoke_training_truth
input_roles:
  - standalone
  - target
  - protected
  - parent
operational_authority:
  states:
    invalid: 0
    hypothesis: 1
    draft: 2
    qa_passed_noncertified: 3
    certified: 4
  artifact_classes:
    invalid:
      namespace: operational_output
      allowed_states:
        - invalid
      default_state: invalid
      descendant: false
      certificate_required_for_certified: false
    machine_candidate:
      namespace: operational_output
      allowed_states:
        - hypothesis
        - draft
      default_state: hypothesis
      descendant: false
      certificate_required_for_certified: false
    qa_passed_machine_candidate:
      namespace: operational_output
      allowed_states:
        - qa_passed_noncertified
      default_state: qa_passed_noncertified
      descendant: false
      certificate_required_for_certified: false
    operationally_certified_artifact:
      namespace: operational_output
      allowed_states:
        - certified
      default_state: certified
      descendant: false
      certificate_required_for_certified: true
    refinement:
      namespace: operational_output
      allowed_states:
        - hypothesis
        - draft
        - qa_passed_noncertified
        - certified
      default_state: draft
      descendant: true
      certificate_required_for_certified: true
    derived_mask:
      namespace: operational_output
      allowed_states:
        - hypothesis
        - draft
        - qa_passed_noncertified
        - certified
      default_state: draft
      descendant: true
      certificate_required_for_certified: true
    projection:
      namespace: operational_output
      allowed_states:
        - hypothesis
        - draft
        - qa_passed_noncertified
        - certified
      default_state: draft
      descendant: true
      certificate_required_for_certified: true
    inpaint_mask:
      namespace: operational_output
      allowed_states:
        - hypothesis
        - draft
        - qa_passed_noncertified
        - certified
      default_state: draft
      descendant: true
      certificate_required_for_certified: true
  producer_actor: maskfactory_producer
  consumer_actor: main_controller
training_truth:
  operationally_comparable: false
  tiers:
    human_anchor_gold:
      artifact_class: human_anchor_gold
      assigners:
        - human_reviewer
      training_eligible: true
      holdout_eligible: true
    autonomous_certified_gold:
      artifact_class: autonomous_certified_gold
      assigners:
        - maskfactory_training_governance
      training_eligible: true
      holdout_eligible: false
    weighted_pseudo_label:
      artifact_class: weighted_pseudo_label
      assigners:
        - maskfactory_training_governance
      training_eligible: true
      holdout_eligible: false
    machine_candidate:
      artifact_class: machine_candidate
      assigners:
        - maskfactory_training_governance
      training_eligible: false
      holdout_eligible: false
intended_uses:
  preview:
    namespace: operational_output
    minimum_operational_authority_state: hypothesis
    allowed_training_truth_tiers: []
  bounded_repair:
    namespace: operational_output
    minimum_operational_authority_state: draft
    allowed_training_truth_tiers: []
  candidate_comparison:
    namespace: operational_output
    minimum_operational_authority_state: draft
    allowed_training_truth_tiers: []
  qa:
    namespace: operational_output
    minimum_operational_authority_state: qa_passed_noncertified
    allowed_training_truth_tiers: []
  production_conditioning:
    namespace: operational_output
    minimum_operational_authority_state: certified
    allowed_training_truth_tiers: []
  training:
    namespace: training_truth
    minimum_operational_authority_state: null
    allowed_training_truth_tiers:
      - human_anchor_gold
      - autonomous_certified_gold
      - weighted_pseudo_label
  training_governance:
    namespace: training_truth
    minimum_operational_authority_state: null
    allowed_training_truth_tiers:
      - human_anchor_gold
      - autonomous_certified_gold
      - weighted_pseudo_label
      - machine_candidate
policy_sha256: 766cbba7088ecf384e4f39c2142094367ffdbfd38c0d3b4d6db6ca09d763399c

config_version: 1.0.0
seed: 1337
gpu_cooldown_sec: 3

io:
  workdir: work
  packages_root: data/packages
  runs_root: runs

intake:
  min_side: 512

devices:
  detector: cpu
  silhouette: cuda
  parsing: cuda
  pose: cuda
  sam2: cuda
  densepose: cuda
  fusion: cpu

stages:
  S00: {enabled: true}
  S01: {enabled: true, model: yolo11m_person, confidence: 0.5, instance_min_area_pct: 0.04, max_instances_per_image: 4, crowd_scene_threshold: 8, context_scale: 1.25, zero_box_fallback: groundingdino_person, fallback_prompt: person, fallback_box_threshold: 0.30, fallback_text_threshold: 0.25}
  S02: {enabled: true, model: birefnet_general, precision: fp16, long_side: 2048, tile_overlap: 128, threshold: 0.5, connected_min_person_pct: 0.01, silhouette_bbox_ratio: [0.35, 0.95], local_cuda_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", hf_home: "models/runtime_cache/huggingface"}
  S03: {enabled: true, model: sapiens_0_6b_seg, precision: bf16, long_side: 1024, tile_size: 1536, tile_overlap: 128, oom_half_res_retry: true, fallback: schp_atr, local_cuda_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", schp_cache: "models/runtime_cache/schp"}
  S04: {enabled: true, model: dwpose_133, keypoint_confidence: 0.3, degraded_body_keypoint_fraction: 0.6, local_cuda_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", ort_gpu_site: "models/runtime_cache/onnxruntime_gpu"}
  S05: {enabled: true, side_parser_policy: paired_union_pose_capsule_v2}
  S06: {enabled: true, box_threshold: 0.30, text_threshold: 0.25, local_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", source_path: "models/runtime_cache/groundingdino/856dde20aee659246248e20734ef9ba5214f5e44", dependency_site: "models/runtime_cache/groundingdino_deps", hf_home: "models/runtime_cache/huggingface"}
  S07: {enabled: true, primary_model: sam2_1_large, oom_fallback: sam2_1_base_plus, local_cuda_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", source_path: "models/runtime_cache/sam2/2b90b9f5ceec907a1c18123530e92e794ad901a4", dependency_site: "models/runtime_cache/sam2_deps"}
  S08: {enabled: true, coverage_policy: seed_then_nearest}
  S08.5: {enabled: true, local_cuda_python: "C:/Comfy_UI_Main/ComfyUI/.venv/Scripts/python.exe", source_path: "models/runtime_cache/detectron2/02b5c4e295e990042a714712c21dc79b731e8833", dependency_site: "models/runtime_cache/detectron2_deps"}
  S09: {enabled: true}
  S09.5: {enabled: true}
  S10: {enabled: true}
  S11: {enabled: true}
  S12: {enabled: true}
  S13: {enabled: true}
  S14: {enabled: true}
  S15: {enabled: true}


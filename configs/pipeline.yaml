pose_tags_rules:
  arms_raised: {metric: shoulder_to_wrist_vertical_fraction, operator: gt, threshold: 0.15}
  arms_down: {metric: shoulder_to_wrist_vertical_fraction, operator: lt, threshold: -0.20}
  arms_crossed: {metric: wrist_opposite_torso_overlap, operator: gte, threshold: 1.0}
  seated_or_crouched: {metric: mean_hip_knee_ankle_angle_deg, operator: lt, threshold: 135}
  lying: {metric: lying_likelihood, operator: gt, threshold: 0.5}
  walking: {metric: walking_likelihood, operator: gt, threshold: 0.5}
  leg_overlap: {metric: left_right_leg_bbox_iou, operator: gt, threshold: 0.15}

fusion:
  contested_score_threshold: 0.4
  agreement_bands: {quick_pass_min: 0.85, normal_min: 0.60}
  weights: {sam2: 0.40, sapiens: 0.25, geometry: 0.15, schp: 0.10, densepose: 0.10, custom_bodypart: 0.45, auxiliary: 0.05}
  zorder_rules:
    - {priority: 10, winner: hand_or_finger, loser: torso_or_thigh, condition: wrist_depth_cue_front}
    - {priority: 20, winner: hair, loser: [head_face, neck, left_shoulder, right_shoulder], condition: overlap}
    - {priority: 30, winner: uninterrupted_limb_contour, loser: interrupted_limb_contour, condition: crossed_limbs}
    - {priority: 40, winner: occluding_object, loser: body_part, condition: gdino_sam2_closed_contour_cover}
    - {priority: 100, winner: higher_consensus_score, loser: lower_consensus_score, condition: unresolved_tie}

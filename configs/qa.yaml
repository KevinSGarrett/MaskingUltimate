config_version: 2.0.0

autonomous_certification:
  require_provider_family_independence: true
  minimum_independent_model_families: 3
  require_instance_exclusivity: true
  maximum_cross_person_bleed_px: 0
  require_reciprocal_contact_occlusion: true
  perturbations: [resize, crop, color, prompt, flip_with_swap_partner]
  require_no_blocking_eligible_critic_defect: true
  require_in_distribution: true
  require_complete_hash_chain: true
  require_active_risk_bucket_certificate: true

checks:
  QC-011: {name: atomic_exclusivity, severity: BLOCK, max_overlap_px: 0}
  QC-012: {name: inside_silhouette, severity: ROUTE, max_outside_fraction: 0.002}
  QC-013: {name: protected_overlap, severity: BLOCK, max_overlap_fraction: 0.005, skin_clothing_max_px: 0}
  QC-014: {name: left_right_consistency, severity: BLOCK, required_matching_votes: 2, available_votes: [pose_skeleton, mediapipe_handedness, densepose_surface]}
  QC-015: {name: area_sanity, severity: ROUTE, ranges_from: configs/ontology.yaml.expected_area_pct_range}
  QC-016: {name: visibility_vs_frame, severity: BLOCK, keypoint_confidence: 0.3}
  QC-017: {name: components_limit, severity: ROUTE, limits_from: configs/ontology.yaml.max_components}
  QC-018: {name: crop_roundtrip, severity: BLOCK, min_iou: 0.995}
  QC-019: {name: breast_skin_identity, severity: BLOCK, exact_match: true}
  QC-020: {name: projected_containment, severity: BLOCK, max_outside_px: 0, forbidden_directory: masks}
  QC-021: {name: hole_ratio, severity: WARN, max_ratio: 0.01, exemptions: [hair, lace_or_sheer_covered]}
  QC-022: {name: edge_alignment, severity: WARN, min_contour_to_band_gradient_ratio: 0.6, band_radius_px: 3}
  QC-023: {name: visibility_state_consistency, severity: ROUTE, visible_min_fraction: 0.9, partial_min_fraction: 0.1, partial_max_fraction: 0.9}
  QC-024: {name: front_back_surface, severity: ROUTE, densepose_majority_min: 0.5}

metrics:
  boundary_tolerance_px: 2
  hausdorff_percentile: 95
  hard_classes: [hair, chest_upper_torso, left_breast, right_breast, belly_button, left_thumb, right_thumb, left_index_finger, right_index_finger, left_middle_finger, right_middle_finger, left_ring_finger, right_ring_finger, left_pinky, right_pinky, left_toes, right_toes]
  normalized_score_terms:
    iou_vs_consensus: {direction: higher_better, weight: 0.30}
    boundary_f_2px: {direction: higher_better, weight: 0.25}
    disagreement_score: {direction: lower_better, weight: 0.20}
    hole_ratio: {direction: lower_better, weight: 0.10}
    overlap_with_protected_regions: {direction: lower_better, weight: 0.075}
    overlap_with_mutually_exclusive_parts: {direction: lower_better, weight: 0.075}

class_tier_weights:
  default: 1.0
  hard: 2.0
  hard_parts: [hair, chest_upper_torso, left_breast, right_breast, left_thumb, right_thumb, left_index_finger, right_index_finger, left_middle_finger, right_middle_finger, left_ring_finger, right_ring_finger, left_pinky, right_pinky]

qa_score:
  formula: weighted_mean(per_part_normalized_metric_score, class_tier_weight)
  block_override: false
  range: [0.0, 1.0]

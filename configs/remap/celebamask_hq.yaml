schema_version: "1.0.0"
source: celebamask_hq
source_root: C:/Comfy_UI_Main/MaskedWarehouse/CelebAMask-HQ
source_encoding: per-component RGB binary PNGs; 18 observed component tokens
status: initial_plan_complete_license_blocked
source_authority: external_source_masks_never_gold
license: non-commercial research/education only
training_allowed: false
side_convention: source left/right must be fixture-validated as character perspective before use
normalization:
  foreground_colors: [[255, 255, 255]]
  background_colors: [[0, 0, 0]]
  output: one binary source component at a time
mappings:
  background: {action: direct, part: [background], material: [none/background]}
  skin: {action: merge, part: [head_face], material: [skin]}
  nose: {action: merge, part: [head_face], material: [skin], detail_role: face_qa}
  l_eye: {action: merge, part: [head_face], material: [skin], detail_role: left_eye_qa}
  r_eye: {action: merge, part: [head_face], material: [skin], detail_role: right_eye_qa}
  l_brow: {action: merge, part: [head_face], material: [skin], detail_role: left_brow_qa}
  r_brow: {action: merge, part: [head_face], material: [skin], detail_role: right_brow_qa}
  mouth: {action: merge, part: [head_face], material: [skin], detail_role: mouth_qa}
  u_lip: {action: merge, part: [head_face], material: [skin], detail_role: upper_lip_qa}
  l_lip: {action: merge, part: [head_face], material: [skin], detail_role: lower_lip_qa}
  hair: {action: direct, part: [hair], material: [hair_material]}
  l_ear: {action: merge, part: [head_face], material: [skin], note: ears disabled by default}
  r_ear: {action: merge, part: [head_face], material: [skin], note: ears disabled by default}
  neck: {action: direct, part: [neck], material: [skin]}
  eye_g: {action: direct, part: [accessory_or_prop], material: [accessory]}
  ear_r: {action: direct, part: [accessory_or_prop], material: [accessory]}
  neck_l: {action: direct, part: [accessory_or_prop], material: [accessory]}
  hat: {action: direct, part: [accessory_or_prop], material: [accessory]}
  cloth:
    action: split_required
    part: [chest_upper_torso, left_shoulder, right_shoulder]
    material: [clothing_generic]
    note: source cloth shape is a material vote; PART assignment requires pose and geometry

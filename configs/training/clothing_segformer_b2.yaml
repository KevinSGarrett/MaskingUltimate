schema_version: 1.0.0
task: material_semantic_segmentation
model:
  architecture: segformer_b2
  pretrained: imagenet
  num_classes: 16
data:
  dataset: maskfactory_materials
  crop_size: [512, 512]
  ignore_index: 255
  seed: 1337
  crop_class_weights: {strap: 4.0, waistband: 4.0, lace_or_sheer: 4.0}
augmentations:
  - {type: random_resized_crop, output_size: 512, scale: [0.5, 2.0], rare_force_probability: 0.4}
  - {type: horizontal_flip, probability: 0.5, swap_partner_remap: true}
  - {type: photometric_jitter, brightness: 0.25, contrast: 0.25, saturation: 0.25, hue: 0.05}
  - {type: rotate, degrees: 15, label_interpolation: nearest, border_label: 255}
optimizer:
  type: AdamW
  learning_rate: 0.00006
  schedule: {type: poly, power: 1.0, warmup_iters: 1500}
training:
  iterations: 30000
  batch_per_gpu: 2
  gradient_accumulation: 8
  amp: bf16
evaluation:
  metrics: [mean_iou, per_class_iou, boundary_f_2px]
promotion_gate:
  beats: schp_atr_plus_s08_heuristics
  strap_iou_min: 0.55
  waistband_iou_min: 0.55

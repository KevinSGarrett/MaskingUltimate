# MaskFactory GPU runtime overlay (governed, private/personal/noncommercial).
#
# Loopback-only. Bypasses the corrupt WSL Ubuntu-22.04 ext4 VHD by running the
# CUDA train/serve runtimes as host NVIDIA-backed containers.
#
#   docker compose -f docker/compose.gpu.yml build maskfactory-serve
#   docker compose -f docker/compose.gpu.yml up -d maskfactory-serve
#   docker compose -f docker/compose.gpu.yml run --rm maskfactory-train
#
# The repo is bind-mounted at /opt/maskfactory so the container sees the same
# models/, configs/, schemas/, and can write evidence into runtime_artifacts/.

services:
  maskfactory-serve:
    image: maskfactory/serve:cu128
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    container_name: maskfactory_serve_cu128
    gpus: all
    ports:
      # Loopback only; never expose the Mode-B service to the LAN.
      - "127.0.0.1:8765:8765"
    volumes:
      - ..:/opt/maskfactory
    working_dir: /opt/maskfactory
    environment:
      MASKFACTORY_CONTAINER_RUNTIME: serve_cu128
    command: ["python", "-m", "maskfactory", "serve", "--port", "8765"]

  maskfactory-train:
    image: maskfactory/train:cu128
    build:
      context: ..
      dockerfile: docker/Dockerfile.train
    container_name: maskfactory_train_cu128
    gpus: all
    volumes:
      - ..:/opt/maskfactory
    working_dir: /opt/maskfactory
    environment:
      MASKFACTORY_CONTAINER_RUNTIME: train_cu128
    # Default: run the fail-closed training runtime probe. Override with a real
    # `maskfactory train ...` invocation once gold training volume exists.
    command: ["python", "-m", "maskfactory", "training-doctor"]
